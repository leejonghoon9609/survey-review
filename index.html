<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지하시설물 후측량 검수 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--line:#e3e3e0;--ink:#1c1c1a;--muted:#6b6b66;--bg:#fafaf8;--ok:#2e7d32;--bad:#d32f2f;--accent:#1f6fd6}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:var(--ink);background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 14px;border-bottom:1px solid var(--line);background:#fff}
  header h1{font-size:14px;font-weight:600;margin-right:6px}
  select,input[type=text]{font:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink)}
  .conn{font-size:12px;padding:4px 8px;border-radius:6px;margin-left:auto}
  .conn.on{background:#eef6ef;color:var(--ok)} .conn.off{background:#f3f3f0;color:var(--muted)}
  .toolbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:7px 14px;border-bottom:1px solid var(--line);background:#fff}
  .grp{display:flex;gap:5px;align-items:center;padding:0 6px;border-right:1px solid var(--line)}
  .grp:last-child{border-right:none}
  .glbl{font-size:10px;color:var(--muted);margin-right:2px}
  button{font:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:5px;transition:.12s;white-space:nowrap}
  button:hover{background:#f2f2ef}
  button.on{border-color:var(--ink);background:#f2f2ef;font-weight:600}
  button.on-ok{border-color:var(--ok);color:var(--ok);background:#eef6ef;font-weight:600}
  button.on-bad{border-color:var(--bad);color:var(--bad);background:#fbeeee;font-weight:600}
  button.pri{border-color:var(--accent);color:var(--accent)}
  .stage{flex:1;display:flex;min-height:0}
  .canvas-wrap{flex:1;position:relative;background:#fff;min-width:0}
  svg#cv{width:100%;height:100%;display:block;touch-action:none;cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='80'%20height='80'%3E%3Cg%20stroke='%23000'%20stroke-width='1'%20fill='none'%3E%3Crect%20x='34'%20y='34'%20width='12'%20height='12'/%3E%3Cline%20x1='0'%20y1='40'%20x2='30'%20y2='40'/%3E%3Cline%20x1='50'%20y1='40'%20x2='80'%20y2='40'/%3E%3Cline%20x1='40'%20y1='0'%20x2='40'%20y2='30'/%3E%3Cline%20x1='40'%20y1='50'%20x2='40'%20y2='80'/%3E%3C/g%3E%3C/svg%3E") 40 40, crosshair}
  .panel{width:240px;border-left:1px solid var(--line);background:#fff;display:none;flex-direction:column}
  .panel h2{font-size:11px;font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);color:var(--muted);display:flex;justify-content:space-between}
  .recs{flex:1;overflow:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
  .rec{display:flex;align-items:center;gap:7px;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:7px}
  .dot{width:11px;height:11px;flex:none}.dot.box{border-radius:2px}.dot.cir{border-radius:50%}
  .rec .del{padding:2px 7px;font-size:12px;line-height:1;color:#999;border:1px solid var(--line);background:#fff;border-radius:5px;cursor:pointer}
  .rec .del:hover{color:var(--bad);border-color:var(--bad);background:#fbeeee}
  .empty{font-size:12px;color:var(--muted);padding:8px}
  .meta{font-size:12px;color:var(--muted);padding:8px 12px;border-top:1px solid var(--line);line-height:1.6}
  .toast{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:#1c1c1a;color:#fff;font-size:12px;padding:8px 14px;border-radius:8px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:.95}
  .coordbox{position:absolute;right:10px;bottom:10px;background:rgba(255,255,255,.93);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:12px;color:var(--ink);font-variant-numeric:tabular-nums;pointer-events:none;box-shadow:0 1px 5px rgba(0,0,0,.07);line-height:1.5}
  .coordbox b{font-weight:600}
  .coordbox .cb-near{display:block;color:var(--muted);font-size:11px;margin-top:1px}
  .recclr{padding:2px 8px;font-size:11px;color:var(--muted);border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer}
  .recclr:hover{color:var(--bad);border-color:var(--bad);background:#fbeeee}
  .photoBtn{background:#eef6ef;border-color:#bcdcc0;color:#2e7d32;font-weight:600}
  .photo-panel{width:44%;min-width:560px;max-width:56%;background:#fff;border-left:1px solid var(--line);display:none;flex-direction:column;flex:none}
  .photo-panel.open{display:flex}
  .php-head{display:flex;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .php-head h3{font-size:13px;font-weight:600;margin-right:auto}
  .php-body{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px;min-height:0}
  .php-main,.php-sub{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fafaf8;display:flex;flex-direction:column}
  .php-main{flex:3;min-height:160px}
  .php-main .cap,.php-sub .cap{font-size:11px;color:var(--muted);padding:5px 9px;border-bottom:1px solid var(--line);background:#fff;display:flex;justify-content:space-between;gap:6px;flex:none}
  .php-main .cap span:first-child,.php-sub .cap span:first-child{color:var(--accent);font-weight:600}
  .php-main .ph{flex:1;width:100%;height:auto;min-height:0;object-fit:contain;background:#f3f3f0;display:block}
  .php-row{display:flex;gap:10px;flex:2;min-height:130px}
  .php-sub{flex:1;min-width:0}
  .php-sub .ph{flex:1;width:100%;height:auto;min-height:0;object-fit:contain;background:#f3f3f0;display:block}
  .ph.php-none{display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px}
  @media(max-width:760px){.glbl{display:none}.coordbox{font-size:11px;padding:5px 8px}.photo-panel{width:100%;min-width:0}.php-main{min-height:140px}.php-row{min-height:120px}}
</style>
</head>
<body>
  <header>
    <h1>후측량 검수 시스템</h1>
    <select id="proj"><option value="">현장 선택…</option></select>
    <button id="newProj">＋ 새 현장</button>
    <button id="save" class="pri">저장</button>
    <button id="photoBtn" class="photoBtn">측점사진보기</button>
    <span id="conn" class="conn off">로컬 모드</span>
  </header>

  <div class="toolbar">
    <div class="grp"><span class="glbl">데이터</span>
      <button id="loadCsv">CSV 업로드</button>
      <button id="loadDxf">결선 DXF</button>
      <button id="sample">샘플</button>
    </div>
    <div class="grp"><span class="glbl">결선</span>
      <button id="autoLine">자동 결선</button>
      <button id="drawLine">직접 그리기</button>
      <button id="doneLine" style="display:none">완료</button>
      <button id="delLine">선 지우기</button>
      <button id="clearLine">모두 삭제</button>
    </div>
    <div class="grp"><span class="glbl">검수</span>
      <button id="m-pan" class="on">✋ 이동</button>
      <button id="m-box">▢ 박스</button>
      <button id="m-cir">◯ 써클</button>
      <button id="s-ok">✓ 확인</button>
      <button id="s-bad">! 이상</button>
      <button id="undo">되돌리기</button>
      <button id="clearMk">표시 지우기</button>
    </div>
    <div class="grp"><span class="glbl">보기</span>
      <button id="zin">＋</button><button id="zout">－</button><button id="fit">전체</button>
    </div>
  </div>

  <div class="stage">
    <div class="canvas-wrap">
      <svg id="cv" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="coordBox" class="coordbox">X <b>–</b>　Y <b>–</b></div>
      <div id="toast" class="toast"></div>
    </div>
    <div id="photoPanel" class="photo-panel">
      <div class="php-head">
        <h3>측점 사진</h3>
        <select id="photoSel"><option value="">측점 선택…</option></select>
        <button id="photoUp">사진 업로드</button>
        <button id="photoClose">✕</button>
      </div>
      <div class="php-body" id="photoBody"></div>
    </div>
    <aside class="panel">
      <h2><span>검수 기록</span><span style="display:flex;gap:8px;align-items:center"><button id="recClear" class="recclr">전체삭제</button><span id="recCount">0</span></span></h2>
      <div class="recs" id="recs"><div class="empty">표시 없음</div></div>
      <div class="meta" id="meta">현장 미선택 · 측량점 0</div>
    </aside>
  </div>

  <input type="file" id="fCsv" accept=".csv" style="display:none">
  <input type="file" id="fDxf" accept=".dxf" style="display:none">
  <input type="file" id="fPhotos" accept="image/*" multiple style="display:none">

<script>
/* ====== 설정: 본인 Supabase 정보 입력 (비우면 로컬 모드) ====== */
var SUPABASE_URL = "https://yidswostdxaejjeikxhg.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpZHN3b3N0ZHhhZWpqZWlreGhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjM1MDAsImV4cCI6MjA5MzUzOTUwMH0.DIP9Yqr7v0Z5y4bdqU5UkoNn1OL0dh1WuYhaiOxtaq4";
/* ============================================================== */

var SVGNS="http://www.w3.org/2000/svg";
var cv=document.getElementById('cv');
var gGeo=document.createElementNS(SVGNS,'g'); gGeo.setAttribute('pointer-events','none');
var gMark=document.createElementNS(SVGNS,'g'); gMark.setAttribute('pointer-events','none');
cv.appendChild(gGeo); cv.appendChild(gMark);

/* 상태 */
var state={ projectId:null, projectName:null, points:[], lines:[], markups:[] };
var mode='pan', status='ok';
var LINECOL={"통신관로":{c:"#d92b2b",w:1.6},"압입구간":{c:"#1f6fd6",w:1.6,dash:"5 4"},"지거":{c:"#b59a00",w:1.2,dash:"3 3"},"주입상인출선":{c:"#999",w:1}};
var MKCOL={ok:'#2e7d32',bad:'#d32f2f'};

function el(t,a){var e=document.createElementNS(SVGNS,t);for(var k in a)e.setAttribute(k,a[k]);return e;}
function S(x,y){return [x,-y];}                 // 화면좌표(북쪽 위)
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}

/* ====== 렌더 ====== */
function clearSvg(g){while(g.firstChild)g.removeChild(g.firstChild);}
var LABEL_D=4.5; // 이 거리(m)보다 가까운 점끼리만 인출선 처리 (조절 가능)
function computeLabels(){
  var pts=state.points,n=pts.length,vis=new Array(n).fill(false),groups=[];
  for(var i=0;i<n;i++){if(vis[i])continue;var st=[i],grp=[];vis[i]=true;
    while(st.length){var k=st.pop();grp.push(k);for(var j=0;j<n;j++){if(!vis[j]){var dx=pts[j].x-pts[k].x,dy=pts[j].y-pts[k].y;if(dx*dx+dy*dy<LABEL_D*LABEL_D){vis[j]=true;st.push(j);}}}}
    groups.push(grp);}
  var lay=new Array(n);
  groups.forEach(function(grp){
    if(grp.length===1){var p=pts[grp[0]];lay[grp[0]]={lx:p.x+0.7,ly:p.y,anchor:'start',leader:false};return;}
    var cx=0,cy=0;grp.forEach(function(g){cx+=pts[g].x;cy+=pts[g].y;});cx/=grp.length;cy/=grp.length;
    var rad=0;grp.forEach(function(g){rad=Math.max(rad,Math.hypot(pts[g].x-cx,pts[g].y-cy));});
    var R=Math.max(rad+3.5,4.5);
    var order=grp.slice().sort(function(a,b){return Math.atan2(pts[a].y-cy,pts[a].x-cx)-Math.atan2(pts[b].y-cy,pts[b].x-cx);});
    var base=Math.atan2(pts[order[0]].y-cy,pts[order[0]].x-cx);
    order.forEach(function(g,idx){var ang=base+2*Math.PI*idx/order.length,lx=cx+R*Math.cos(ang),ly=cy+R*Math.sin(ang);lay[g]={lx:lx,ly:ly,anchor:Math.cos(ang)>=0?'start':'end',leader:true};});
  });
  return lay;
}
function drawGeo(){
  clearSvg(gGeo);
  state.lines.forEach(function(L){var def=LINECOL[L.layer]||{c:"#888",w:1.2};
    var pts=L.pts.map(function(p){var s=S(p[0],p[1]);return s[0]+','+s[1];}).join(' ');
    var pl=el('polyline',{points:pts,fill:'none',stroke:def.c,'stroke-width':def.w,'vector-effect':'non-scaling-stroke','stroke-linejoin':'round','stroke-linecap':'round'});
    if(def.dash)pl.setAttribute('stroke-dasharray',def.dash);
    gGeo.appendChild(pl);
  });
  var lay=computeLabels();
  state.points.forEach(function(p,i){var s=S(p.x,p.y);
    gGeo.appendChild(el('rect',{x:s[0]-0.35,y:s[1]-0.35,width:0.7,height:0.7,fill:'#1c1c1a'}));
    if(/^\s*M/.test(p.code||''))gGeo.appendChild(el('circle',{cx:s[0],cy:s[1],r:0.8,fill:'none',stroke:'#000','stroke-width':1.2,'vector-effect':'non-scaling-stroke'}));
    var L=lay[i],ls=S(L.lx,L.ly),off=L.anchor==='start'?0.15:-0.15;
    if(L.leader)gGeo.appendChild(el('line',{x1:s[0],y1:s[1],x2:ls[0],y2:ls[1],stroke:'#999','stroke-width':0.9,'vector-effect':'non-scaling-stroke','stroke-dasharray':'2 1.5'}));
    var nt=el('text',{x:ls[0]+off,y:ls[1]-0.18,'font-size':0.55,fill:'#1a7a3a','text-anchor':L.anchor});nt.textContent=p.no;gGeo.appendChild(nt);
    var ct=el('text',{x:ls[0]+off,y:ls[1]+0.55,'font-size':0.55,fill:'#0f7a86','text-anchor':L.anchor});ct.textContent=(p.code||'').trim();gGeo.appendChild(ct);
  });
}
function drawMarks(){ clearSvg(gMark);
  state.markups.forEach(function(m){
    var sh=m.type==='cir'?el('ellipse',{cx:m.cx,cy:m.cy,rx:m.rx,ry:m.ry}):el('rect',{x:m.x,y:m.y,width:m.w,height:m.h,rx:0.4});
    sh.setAttribute('fill',MKCOL[m.status]);sh.setAttribute('fill-opacity',0.13);sh.setAttribute('stroke',MKCOL[m.status]);sh.setAttribute('stroke-width',2);sh.setAttribute('vector-effect','non-scaling-stroke');sh.setAttribute('pointer-events','none');
    gMark.appendChild(sh); m.el=sh;
  });
  renderRecs();
}
function renderRecs(){var box=document.getElementById('recs');document.getElementById('recCount').textContent=state.markups.length;
  if(!state.markups.length){box.innerHTML='<div class="empty">표시 없음</div>';return;}
  box.innerHTML=state.markups.map(function(r,i){
    return '<div class="rec"><span class="dot '+(r.type==='cir'?'cir':'box')+'" style="background:'+MKCOL[r.status]+'"></span>'
      +'<span style="color:#6b6b66">'+(i+1)+'</span><span>'+(r.type==='cir'?'써클':'박스')+'</span>'
      +'<span style="color:'+MKCOL[r.status]+'">· '+(r.status==='ok'?'확인':'이상')+'</span>'
      +'<span style="margin-left:auto;color:#6b6b66;margin-right:6px">'+(r.near||'-')+'</span>'
      +'<button class="del" data-i="'+i+'">✕</button></div>';
  }).join('');
}
function updMeta(){document.getElementById('meta').textContent=(state.projectName||'현장 미선택')+' · 측량점 '+state.points.length+' · 결선 '+state.lines.filter(function(l){return l.layer==='통신관로';}).length;}

/* ====== 뷰박스 ====== */
var vb={x:0,y:0,w:100,h:100}, vb0={x:0,y:0,w:100,h:100};
function applyVB(){cv.setAttribute('viewBox',vb.x+' '+vb.y+' '+vb.w+' '+vb.h);}
function fitView(){
  var xs=[],ys=[];function add(x,y){var s=S(x,y);xs.push(s[0]);ys.push(s[1]);}
  state.points.forEach(function(p){add(p.x,p.y);});
  state.lines.forEach(function(L){L.pts.forEach(function(p){add(p[0],p[1]);});});
  if(!xs.length){vb={x:0,y:0,w:100,h:100};vb0={x:0,y:0,w:100,h:100};applyVB();return;}
  var pad=5,minx=Math.min.apply(0,xs),maxx=Math.max.apply(0,xs),miny=Math.min.apply(0,ys),maxy=Math.max.apply(0,ys);
  vb0={x:minx-pad,y:miny-pad,w:(maxx-minx)+2*pad,h:(maxy-miny)+2*pad};
  vb={x:vb0.x,y:vb0.y,w:vb0.w,h:vb0.h};applyVB();
}
function toWorld(cx,cy){var r=cv.getBoundingClientRect();return [vb.x+(cx-r.left)/r.width*vb.w, vb.y+(cy-r.top)/r.height*vb.h];}
function zoomAt(f,cx,cy){var w=toWorld(cx,cy),r=cv.getBoundingClientRect();vb.w*=f;vb.h*=f;vb.x=w[0]-(cx-r.left)/r.width*vb.w;vb.y=w[1]-(cy-r.top)/r.height*vb.h;applyVB();}

/* ====== 결선 ====== */
function nearestPointWorld(wx,wy){var best=null,bd=1e18;state.points.forEach(function(p){var s=S(p.x,p.y);var d=(s[0]-wx)*(s[0]-wx)+(s[1]-wy)*(s[1]-wy);if(d<bd){bd=d;best=p;}});return {p:best,d:Math.sqrt(bd)};}
function autoConnect(){
  if(state.points.length<2){toast('측량점을 먼저 올려주세요');return;}
  state.lines=state.lines.filter(function(l){return l.layer!=='통신관로';}); // 자동결선만 갱신
  var rem=state.points.slice(), routes=[], THRESH=40;
  rem.sort(function(a,b){return a.x-b.x;});
  var cur=rem.shift(), line=[[cur.x,cur.y]];
  while(rem.length){
    var bi=0,bd=1e18;for(var i=0;i<rem.length;i++){var d=Math.hypot(rem[i].x-cur.x,rem[i].y-cur.y);if(d<bd){bd=d;bi=i;}}
    var nx=rem.splice(bi,1)[0];
    if(bd<=THRESH)line.push([nx.x,nx.y]); else{routes.push(line);line=[[nx.x,nx.y]];}
    cur=nx;
  }
  routes.push(line);
  routes.forEach(function(r){if(r.length>=2)state.lines.push({layer:'통신관로',pts:r});});
  drawGeo();updMeta();toast('자동 결선 '+routes.filter(function(r){return r.length>=2;}).length+'개 생성 (검수·수정하세요)');
}
var lineDraft=null, previewLine=null;
function startDraw(){mode='line';setModeUI();lineDraft=[];document.getElementById('doneLine').style.display='';toast('점을 차례로 클릭 → 완료');}
function finishDraw(){if(lineDraft&&lineDraft.length>=2)state.lines.push({layer:'통신관로',pts:lineDraft.slice()});lineDraft=null;if(previewLine){previewLine.remove();previewLine=null;}document.getElementById('doneLine').style.display='none';mode='pan';setModeUI();drawGeo();updMeta();}
function clearLines(){state.lines=state.lines.filter(function(l){return l.layer!=='통신관로';});drawGeo();updMeta();toast('결선 모두 삭제');}
function segDist(px,py,ax,ay,bx,by){var dx=bx-ax,dy=by-ay,L2=dx*dx+dy*dy,t=L2?((px-ax)*dx+(py-ay)*dy)/L2:0;t=Math.max(0,Math.min(1,t));var cx=ax+t*dx,cy=ay+t*dy;return Math.hypot(px-cx,py-cy);}
function deleteSegmentAt(wx,wy){
  var best=null,bd=1e18;
  state.lines.forEach(function(L,li){ if(L.layer!=='통신관로')return;
    for(var s=0;s<L.pts.length-1;s++){var a=S(L.pts[s][0],L.pts[s][1]),b=S(L.pts[s+1][0],L.pts[s+1][1]);
      var d=segDist(wx,wy,a[0],a[1],b[0],b[1]); if(d<bd){bd=d;best={li:li,si:s};}}});
  if(!best||bd>vb.w*0.03){toast('지울 선에 더 가까이 클릭하세요');return;}
  var L=state.lines[best.li],left=L.pts.slice(0,best.si+1),right=L.pts.slice(best.si+1),repl=[];

  state.lines.splice.apply(state.lines,[best.li,1].concat(repl));

}

function decodeBuf(buf){var u=new TextDecoder('utf-8',{fatal:false}).decode(buf);if(u.indexOf('\uFFFD')>=0){try{return new TextDecoder('euc-kr').decode(buf);}catch(e){return u;}}return u;}
function splitCsvLine(s){var out=[],cur='',q=false;for(var i=0;i<s.length;i++){var c=s[i];if(c==='"'){q=!q;}else if(c===','&&!q){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out;}
function parseCsv(text,fname){
  var rows=text.replace(/\r/g,'').split('\n').filter(function(l){return l.trim().length;});
  if(!rows.length)return [];
  var head=splitCsvLine(rows[0]).map(function(s){return s.trim();});
  function col(){for(var a=0;a<arguments.length;a++){var i=head.indexOf(arguments[a]);if(i>=0)return i;}return -1;}
  var ci={name:col('이름','번호'),x:col('X'),y:col('Y'),z:col('Z(레벨)','Z','Z(레벨)'),code:col('코드'),date:col('현재날짜')};
  var dm=(fname||'').match(/20(\d{6})/);var fdate=dm?dm[1]:'';
  var pts=[];
  for(var r=1;r<rows.length;r++){var f=splitCsvLine(rows[r]);
    var cx=parseFloat(f[ci.x]),cy=parseFloat(f[ci.y]);if(isNaN(cx)||isNaN(cy))continue;
    var dt=fdate; if(ci.date>=0&&f[ci.date]){var m=f[ci.date].match(/(\d{2})(\d{2})-?(\d{2})-?(\d{2})|\d{4}-(\d{2})-(\d{2})/);var raw=(f[ci.date]||'').replace(/[^0-9]/g,'');if(raw.length>=8)dt=raw.slice(2,8);}
    var name=ci.name>=0?(f[ci.name]||'').trim():String(r);
    pts.push({no:(dt?dt+'-':'')+name, x:cy, y:cx, z:ci.z>=0?parseFloat(f[ci.z]):null, code:ci.code>=0?(f[ci.code]||'').trim():''});
  }
  return pts;
}
function parseDxfLines(text){
  var L=text.replace(/\r/g,'').split('\n'),pairs=[];
  for(var i=0;i+1<L.length;i+=2)pairs.push([L[i].trim(),L[i+1]]);
  var lines=[],i2=0;
  while(i2<pairs.length){
    var code=pairs[i2][0],val=pairs[i2][1];
    if(code==='0'&&(val.trim()==='LWPOLYLINE'||val.trim()==='POLYLINE'||val.trim()==='LINE')){
      var type=val.trim(),layer='0',xs=[],ys=[],j=i2+1,ent={};
      while(j<pairs.length&&pairs[j][0]!=='0'){var c=pairs[j][0],v=pairs[j][1];
        if(c==='8')layer=v.trim();
        if(type==='LINE'){if(c==='10')ent.x1=parseFloat(v);if(c==='20')ent.y1=parseFloat(v);if(c==='11')ent.x2=parseFloat(v);if(c==='21')ent.y2=parseFloat(v);}
        else{if(c==='10')xs.push(parseFloat(v));if(c==='20')ys.push(parseFloat(v));}
        j++;}
      if(type==='LINE'&&ent.x1!=null)lines.push({layer:layer,pts:[[ent.x1,ent.y1],[ent.x2,ent.y2]]});
      else if(xs.length>=2){var pp=[];for(var k=0;k<xs.length;k++)pp.push([xs[k],ys[k]]);lines.push({layer:layer,pts:pp});}
      i2=j;
    } else i2++;
  }
  return lines;
}

  if(!state.projectName){toast('현장명을 먼저 정하세요(새 현장)');return;}
  var row={name:state.projectName,payload:payload,updated_at:new Date().toISOString()};

    compressImage(f,1280,0.7).then(function(blob){
      var path=state.projectId+'/'+num+'.jpg';
      return sb.storage.from('photos').upload(path,blob,{upsert:true,contentType:'image/jpeg'}).then(function(up){
        if(up.error)throw up.error;
        var url=sb.storage.from('photos').getPublicUrl(path).data.publicUrl+'?t='+Date.now();
        return sb.from('survey_photos').delete().eq('project_id',state.projectId).eq('point_no',num).then(function(){
          return sb.from('survey_photos').insert({project_id:state.projectId,point_no:num,url:url}).then(function(ins){if(ins.error)throw ins.error;photoMap[num]=url;ok++;});
        });
      });
    }).catch(function(err){console.error('photo upload',num,err);}).then(function(){
      done++;if(done===arr.length){toast(ok+'/'+arr.length+'장 업로드 완료');if(photoPanelOpen)refreshPhotoPanel();}
    });
  });
}
bind('photoBtn',function(){openPhotoPanel();});
document.getElementById('photoClose').onclick=function(){openPhotoPanel(false);};
document.getElementById('photoUp').onclick=function(){document.getElementById('fPhotos').click();};
document.getElementById('fPhotos').addEventListener('change',function(e){uploadPhotos(e.target.files);e.target.value='';});
document.getElementById('photoSel').addEventListener('change',function(e){if(e.target.value){selNum=e.target.value;highlightSel();refreshPhotoPanel();}else{selNum=null;clearSvg(gSel);refreshPhotoPanel();}});
/* 도면에서 점 탭 → 선택 (이동 모드, 드래그 아닐 때) */
var _tapStart=null;
cv.addEventListener('pointerdown',function(e){_tapStart=[e.clientX,e.clientY];});
cv.addEventListener('pointerup',function(e){
  if(mode!=='pan'||!_tapStart)return;var mv=Math.hypot(e.clientX-_tapStart[0],e.clientY-_tapStart[1]);_tapStart=null;
  if(mv>5)return;var w=toWorld(e.clientX,e.clientY),r=cv.getBoundingClientRect(),wpp=vb.w/r.width;var nr=nearestPointWorld(w[0],w[1]);
  if(nr.p&&nr.d<16*wpp)selectPoint(ptNum(nr.p));
});

/* ====== 좌표 표시 (마우스 따라) ====== */
function fmtCoord(v){return v.toLocaleString('en-US',{minimumFractionDigits:3,maximumFractionDigits:3});}
var coordBox=document.getElementById('coordBox');
function coordReset(){coordBox.innerHTML='X <b>–</b>　Y <b>–</b>';}
cv.addEventListener('mousemove',function(e){
  var w=toWorld(e.clientX,e.clientY); var X=-w[1], Y=w[0];   // X=북, Y=동
  var r=cv.getBoundingClientRect(), wpp=vb.w/r.width;
  var nr=nearestPointWorld(w[0],w[1]); var near='';
  if(nr.p && nr.d < 22*wpp){ near='<span class="cb-near">'+nr.p.no+'  '+((nr.p.code||'').trim())+'</span>'; }
  coordBox.innerHTML='X <b>'+fmtCoord(X)+'</b>　Y <b>'+fmtCoord(Y)+'</b>'+near;
});
cv.addEventListener('mouseleave',coordReset);
document.getElementById('recClear').onclick=function(){if(!state.markups.length){toast('삭제할 검수 기록이 없습니다');return;}state.markups.forEach(function(r){if(r.el)r.el.remove();});state.markups=[];renderRecs();toast('검수 기록 전체 삭제');};

setModeUI();setStatusUI();initSb();updMeta();toast('CSV 업로드 또는 상단에서 현장을 선택하세요');
</script>
