<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--line:#e3e3e0;--ink:#1c1c1a;--muted:#6b6b66;--bg:#fafaf8;--ok:#2a9e50;--bad:#d32f2f;--accent:#1f6fd6}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:var(--ink);background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 14px;border-bottom:1px solid var(--line);background:#fff}
  header h1{font-size:14px;font-weight:600;margin-right:6px}
  select,input[type=text]{font:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink)}
  .conn{font-size:12px;padding:4px 8px;border-radius:6px;margin-left:auto}
  .conn.on{background:#eef6ef;color:var(--ok)} .conn.off{background:#f3f3f0;color:var(--muted)}
  .subbar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);background:#fff;min-height:62px}
  .sub-b{padding:11px 15px;font-size:14px;border-radius:8px}
  .subhint{font-size:12px;color:var(--muted)}
  .rail{width:205px;flex:none;border-right:1px solid var(--line);background:#fafaf8;padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto}
  .rail button{justify-content:flex-start;width:100%;padding:11px 12px;font-size:14px}
  .rail button.on{background:#eef6ef;border-color:var(--ok);color:var(--ok);font-weight:600}
  .rail .sep{height:1px;background:var(--line);margin:3px 1px}
  .hk-badge{margin-left:auto;display:inline-block;background:#c0392b;color:#fff;font-size:10px;font-weight:800;padding:1px 5px;border-radius:4px;min-width:16px;text-align:center;line-height:1.5}
  .sub-b .hk-badge{margin-left:6px}
  .hk-overlay{position:fixed;inset:0;background:rgba(20,20,18,.38);z-index:1000;display:flex;align-items:center;justify-content:center}

  .hk-body{overflow:auto;padding:8px 10px}

  .hk-row .keyb.cap{border-color:var(--accent);color:var(--accent);background:#eef4fc}
  .hk-row .keyb.set{border-color:#c0392b;color:#c0392b}
  .hk-row .clr{font-size:12px;color:#bbb;cursor:pointer;padding:2px 6px;border:1px solid var(--line);border-radius:5px;background:#fff}
  .hk-row .clr:hover{color:var(--bad);border-color:var(--bad)}
  .hk-foot{padding:11px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
  button.soon{color:#b0b0b0;border-style:dashed}
  .viewgrp{margin-left:auto;display:flex;gap:6px;align-items:center}
  .zoomwrap2{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .zoomwrap2 button{border:none;border-right:1px solid var(--line);border-radius:0}
  .zoomwrap2 button:last-child{border-right:none}
  button{font:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:5px;transition:.12s;white-space:nowrap}
  button:hover{background:#f2f2ef}
  button.on{border-color:var(--ink);background:#f2f2ef;font-weight:600}
  button.on-ok{border-color:var(--ok);color:var(--ok);background:#eef6ef;font-weight:600}
  button.on-bad{border-color:var(--bad);color:var(--bad);background:#fbeeee;font-weight:600}
  button.pri{border-color:var(--accent);color:var(--accent)}
  .stage{flex:1;display:flex;min-height:0}
  .maincol{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column}
  .canvas-wrap{flex:1;position:relative;background:#fff;min-width:0}
  svg#cv{width:100%;height:100%;display:block;touch-action:none;cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='80'%20height='80'%3E%3Cg%20stroke='%23000'%20stroke-width='1'%20fill='none'%3E%3Crect%20x='34'%20y='34'%20width='12'%20height='12'/%3E%3Cline%20x1='0'%20y1='40'%20x2='30'%20y2='40'/%3E%3Cline%20x1='50'%20y1='40'%20x2='80'%20y2='40'/%3E%3Cline%20x1='40'%20y1='0'%20x2='40'%20y2='30'/%3E%3Cline%20x1='40'%20y1='50'%20x2='40'%20y2='80'/%3E%3C/g%3E%3C/svg%3E") 40 40, crosshair}
  .panel{width:240px;border-left:1px solid var(--line);background:#fff;display:none;flex-direction:column}
  .panel h2{font-size:11px;font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);color:var(--muted);display:flex;justify-content:space-between}

  .dot{width:11px;height:11px;flex:none}.dot.box{border-radius:2px}.dot.cir{border-radius:50%}

  .toast{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:#1c1c1a;color:#fff;font-size:12px;padding:8px 14px;border-radius:8px;opacity:0;transition:.25s;pointer-events:none}

  .coordbox{position:fixed;right:10px;bottom:10px;z-index:50;background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:12px;color:var(--ink);font-variant-numeric:tabular-nums;pointer-events:none;box-shadow:0 1px 6px rgba(0,0,0,.12);line-height:1.5}

  .coordbox .cb-near{display:block;color:var(--muted);font-size:11px;margin-top:1px}
  .recclr{padding:2px 8px;font-size:11px;color:var(--muted);border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer}
  .recclr:hover{color:var(--bad);border-color:var(--bad);background:#fbeeee}
  .photoBtn{background:#eef6ef;border-color:#bcdcc0;color:#2a9e50;font-weight:600}
  .photo-panel{width:37%;min-width:480px;max-width:44%;background:#fff;border-left:1px solid var(--line);display:none;flex-direction:column;flex:none}
  .linkon{background:#eef6ef;border-color:#bcdcc0;color:#2a9e50;font-weight:600}
  .photo-panel.open{display:flex}
  .php-head{display:flex;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .php-head h3{font-size:13px;font-weight:600;margin-right:auto}
  .php-body{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px;min-height:0}
  .php-main,.php-sub{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fafaf8;display:flex;flex-direction:column}
  .php-main{flex:3;min-height:160px}
  .php-main .cap,.php-sub .cap{font-size:15px;color:#0d47a1;font-weight:700;padding:7px 11px;border-bottom:1px solid var(--line);background:#fff;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .php-main .cap{font-size:16px}
  .zoomwrap{flex:1;min-height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#f3f3f0;position:relative}
  .php-main .zoomwrap .ph{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;flex:none}
  .php-main .ph{flex:1;width:100%;height:auto;min-height:0;object-fit:contain;background:#f3f3f0;display:block}
  .php-row{display:flex;gap:10px;flex:2;min-height:130px}
  .php-sub{flex:1;min-width:0}
  .php-sub .ph{flex:1;width:100%;height:auto;min-height:0;object-fit:contain;background:#f3f3f0;display:block}
  .ph.php-none{display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px}
  @media(max-width:760px){.glbl{display:none}.coordbox{font-size:11px;padding:5px 8px}.photo-panel{width:100%;min-width:0}.php-main{min-height:140px}.php-row{min-height:120px}}
</style>

<body>
  <header>
    <h1>후측량 검수 시스템</h1>
    <select id="proj"><option value="">현장 선택…</option></select>

      <div class="recs" id="recs"><div class="empty">표시 없음</div></div>

  <input type="file" id="fCsv" accept=".csv" style="display:none">

<script>
/* ====== 설정: 본인 Supabase 정보 입력 (비우면 로컬 모드) ====== */
var SUPABASE_URL = "https://yidswostdxaejjeikxhg.supabase.co";
var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpZHN3b3N0ZHhhZWpqZWlreGhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjM1MDAsImV4cCI6MjA5MzUzOTUwMH0.DIP9Yqr7v0Z5y4bdqU5UkoNn1OL0dh1WuYhaiOxtaq4";
/* ============================================================== */

var SVGNS="http://www.w3.org/2000/svg";
var cv=document.getElementById('cv');
var gGeo=document.createElementNS(SVGNS,'g'); gGeo.setAttribute('pointer-events','none');
var gMark=document.createElementNS(SVGNS,'g'); gMark.setAttribute('pointer-events','none');
var gDraft=document.createElementNS(SVGNS,'g'); gDraft.setAttribute('pointer-events','none');
var gPts=document.createElementNS(SVGNS,'g');
var gMH=document.createElementNS(SVGNS,'g'); // 맨홀 심벌 레이어
var gHit=document.createElementNS(SVGNS,'g'); // 측점 클릭 hit (최상위 — 항상 클릭 우선)
cv.appendChild(gGeo); cv.appendChild(gMark); cv.appendChild(gDraft); cv.appendChild(gPts); cv.appendChild(gMH); cv.appendChild(gHit);

/* 상태 */
var state={ projectId:null, projectName:null, points:[], lines:[], markups:[], labelOff:{}, manholes:[] };
// manhole 구조: {id, wx, wy, label, lx, ly}
// wx,wy = 맨홀 중심 세계좌표(x=동,y=북)
// lx,ly = 라벨 앵커 세계좌표
// label = '2M(SKB)' 등
var mode='pan', status='ok';
var LINECOL={"통신관로":{c:"#d92b2b",w:1.6},"압입구간":{c:"#1f6fd6",w:1.6,dash:"5 4"},"지거":{c:"#f2b400",w:2.4},"주입상인출선":{c:"#999",w:1}};
function isTpoint(p){return /(^|\s)T(\s|$)/.test((p&&p.code)||'');}
function pipeCount(p){var m=/[xX×]\s*(\d+)/.exec((p&&p.code)||'');return m?+m[1]:null;}
function isManhole(p){return /^\s*M/.test((p&&p.code)||'');}
var MKCOL={ok:'#2a9e50',bad:'#d32f2f'};

function el(t,a){var e=document.createElementNS(SVGNS,t);for(var k in a)e.setAttribute(k,a[k]);return e;}
function S(x,y){return [x,-y];}                 // 화면좌표(북쪽 위)
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}

/* ====== 렌더 ====== */
function clearSvg(g){while(g.firstChild)g.removeChild(g.firstChild);}
var LABEL_D=4.5; // (구) 근접 그룹 거리 — 현재 미사용, 호환용 유지
function computeLabels(){
  var pts=state.points, n=pts.length, lay=new Array(n);
  if(!n) return lay;
  // 인출선 길이 = 측점 평균 최근접 간격 기반 (현장 스케일에 자동 적응, 모든 라벨 동일 길이)
  var sum=0,cnt=0;
  for(var i=0;i<n;i++){var best=Infinity;
    for(var j=0;j<n;j++){if(i!==j){var d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);if(d<best)best=d;}}
    if(best<Infinity){sum+=best;cnt++;}}
  var avg=cnt?sum/cnt:5;
  var L=Math.max(avg*0.7, 1.0); // 인출선 길이(m). 짧/길게는 0.7 계수만 조절
  // 측점 순서(CSV 순)대로 좌·우 번갈아, 인출선은 수평(측점과 같은 높이)
  for(var k=0;k<n;k++){var p=pts[k],right=(k%2===0);
    lay[k]=right?{lx:p.x+L,ly:p.y,anchor:'start',leader:true}
               :{lx:p.x-L,ly:p.y,anchor:'end',  leader:true};}
  // 작업자가 드래그로 옮긴 라벨은 그 위치 우선
  for(var ii=0;ii<n;ii++){var no=ptNum(pts[ii]);if(state.labelOff&&state.labelOff[no]){var o=state.labelOff[no];lay[ii]={lx:o[0],ly:o[1],anchor:(o[0]<pts[ii].x?'end':'start'),leader:true};}}
  return lay;
}
var labelDragging=false;
// world(SVG)좌표 → 화면픽셀 (오버레이 div 배치용)
// ★ SVG meet 렌더와 동일한 좌표변환의 기준값 (균일 스케일 + xMidYMid 여백)
//   placeLabelDiv(표시)·toWorld(입력)가 이 하나를 공유 → SVG 점과 픽셀단위로 정확히 일치
function vbScale(){
  var r=cv.getBoundingClientRect();
  var s=Math.min(r.width/vb.w, r.height/vb.h);            // meet: 가로·세로 같은 스케일
  return {r:r, s:s, ox:(r.width-vb.w*s)/2, oy:(r.height-vb.h*s)/2}; // 레터박스 여백(중앙정렬)
}
function worldToPx(svgX,svgY){var cvr=cv.getBoundingClientRect();return [(svgX-vb.x)/vb.w*cvr.width,(svgY-vb.y)/vb.h*cvr.height];}
function moveLabelDiv(d,svgX,svgY){d._sx=svgX;d._sy=svgY;placeLabelDiv(d);}
function addLabelHandle(p,L,ls,nt,ct,ld,isSel){
  var anchor=L.anchor;
  var Uh=vb.w/Math.max(cv.getBoundingClientRect().width,1); // 1px = Uh world
  var maxChars=Math.max((''+(p.no||'')).length,((p.code||'').trim()).length);
  var tw=maxChars*9*Uh+10*Uh;  // 글자폭(약 9px/자) + 여백, 화면 고정
  var hh=34*Uh;                 // 두 줄 높이(약 34px), 화면 고정
  var hx=anchor==='start'?(ls[0]-3*Uh):(ls[0]-tw+3*Uh);
  var handle=el('rect',{x:hx,y:ls[1]-hh*0.5,width:tw,height:hh,fill:'transparent','pointer-events':'all'});
  if(isSel){handle.setAttribute('stroke','#22cc00');handle.setAttribute('stroke-width',0.8);handle.setAttribute('stroke-dasharray','2 2');handle.setAttribute('vector-effect','non-scaling-stroke');}
  handle.style.cursor='move';
  var lx=ls[0],ly=ls[1],dragging=false,moved=false,gx=0,gy=0;
  handle.addEventListener('pointerdown',function(ev){
    if(mode!=='pan')return;ev.stopPropagation();ev.preventDefault();
    if(String(ptNum(p))!==String(selNum)){selNum=String(ptNum(p));highlightSel();if(photoPanelOpen)refreshPhotoPanel();}
    dragging=true;moved=false;labelDragging=true;var w=toWorld(ev.clientX,ev.clientY);gx=w[0]-lx;gy=w[1]-ly;
    try{handle.setPointerCapture(ev.pointerId);}catch(e){}});
  handle.addEventListener('pointermove',function(ev){
    if(!dragging)return;ev.preventDefault();moved=true;var w=toWorld(ev.clientX,ev.clientY);
    lx=w[0]-gx;ly=w[1]-gy;var off=anchor==='start'?0.15:-0.15;
    moveLabelDiv(nt,lx+off,ly);
    moveLabelDiv(ct,lx+off,ly);
    if(ld){ld.setAttribute('x2',lx);ld.setAttribute('y2',ly);}
    handle.setAttribute('x',anchor==='start'?(lx-3*Uh):(lx-tw+3*Uh));handle.setAttribute('y',ly-hh*0.5);});
  function up(ev){if(!dragging)return;dragging=false;setTimeout(function(){labelDragging=false;},40);
    if(moved)state.labelOff[ptNum(p)]=[lx,-ly];
    try{handle.releasePointerCapture(ev.pointerId);}catch(e){}
    drawGeo();highlightSel();}
  handle.addEventListener('pointerup',up);handle.addEventListener('pointercancel',up);
  gPts.appendChild(handle);
}
function addNoteHandle(L,t,ld,lx,ly){
  var bb;try{bb=t.getBBox();}catch(e){bb=null;}
  var pad=0.4,bw=bb?bb.width:String(L.note).length*0.42,bh=bb?bb.height:0.85,bx=bb?bb.x:lx+0.25,by=bb?bb.y:ly-0.45;
  var h=el('rect',{x:bx-pad,y:by-pad,width:bw+2*pad,height:bh+2*pad,rx:0.3,fill:'transparent',stroke:'#a07e00','stroke-width':0.7,'stroke-dasharray':'1.6 1.6','vector-effect':'non-scaling-stroke','pointer-events':'all'});h.style.cursor='move';
  var drag=false,moved=false,nx=lx,ny=ly;
  h.addEventListener('pointerdown',function(ev){if(mode!=='pan')return;ev.stopPropagation();drag=true;moved=false;labelDragging=true;h.setAttribute('stroke','#7a5f00');h.setAttribute('stroke-width',1.1);h.setAttribute('stroke-dasharray','2.2 1.4');try{h.setPointerCapture(ev.pointerId);}catch(e){}});
  h.addEventListener('pointermove',function(ev){if(!drag)return;ev.preventDefault();moved=true;var ww=toWorld(ev.clientX,ev.clientY);nx=ww[0];ny=ww[1];

var vb={x:0,y:0,w:100,h:100}, vb0={x:0,y:0,w:100,h:100}, _vbwLast=null;

/* ====== 결선 ====== */
function nearestPointWorld(wx,wy){var best=null,bd=1e18;state.points.forEach(function(p){var s=S(p.x,p.y);var d=(s[0]-wx)*(s[0]-wx)+(s[1]-wy)*(s[1]-wy);if(d<bd){bd=d;best=p;}});return {p:best,d:Math.sqrt(bd)};}
function autoConnect(){
  if(state.points.length<2){toast('측량점을 먼저 올려주세요');return;}
  state.lines=state.lines.filter(function(l){return l.layer!=='통신관로';}); // 자동결선만 갱신
  var THRESH=40, pts=state.points;
  function D(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
  var edges=[];
  function addE(p,q){if(p===q)return;for(var i=0;i<edges.length;i++){var e=edges[i];if((e[0]===p&&e[1]===q)||(e[0]===q&&e[1]===p))return;}edges.push([p,q]);}

  // A) 본선: 같은 관수끼리만 이어줌(관수별 nearest-neighbor 체인). 관수 다르면 잇지 않음 → 안 맞으면 그 점에서 끝.
  var groups={};
  pts.forEach(function(p){var c=pipeCount(p);var k=(c==null?'?':String(c));(groups[k]=groups[k]||[]).push(p);});
  Object.keys(groups).forEach(function(k){
    var g=groups[k].slice(); if(g.length<2)return;
    g.sort(function(a,b){return a.x-b.x;});
    var cur=g.shift();
    while(g.length){
      var bi=0,bd=1e18;for(var i=0;i<g.length;i++){var d=D(g[i],cur);if(d<bd){bd=d;bi=i;}}
      var nx=g.splice(bi,1)[0];
      if(bd<=THRESH)addE(cur,nx); // 같은 관수라도 너무 멀면 끊음(별개 구간)
      cur=nx;
    }
  });

  // B) T점(분기점) 합류: 주위에서 '더 작은 관수' 점들을 가까운 순으로, 합이 T관수가 될 때까지 연결
  pts.forEach(function(P){ if(!isTpoint(P))return; var Np=pipeCount(P); if(Np==null)return;
    var near=pts.filter(function(q){return q!==P && pipeCount(q)!=null && pipeCount(q)<Np && D(P,q)<=THRESH;})
                .sort(function(a,b){return D(P,a)-D(P,b);});
    var acc=0;
    for(var i=0;i<near.length && acc<Np;i++){var c=pipeCount(near[i]); if(acc+c<=Np){addE(P,near[i]);acc+=c;}}
  });

  // C) 맨홀 통과 결선: 맨홀 2.5m 안 측점들을 맨홀 통과로 이어줌(관수 달라도 OK, 각도 무관)
  var MHR=2.5, mhCount=0;
  (state.manholes||[]).forEach(function(mh){
    var nr=pts.map(function(p){return {p:p,d:Math.hypot(p.x-mh.wx,p.y-mh.wy)};}).filter(function(o){return o.d<=MHR;}).sort(function(a,b){return a.d-b.d;});
    if(nr.length>=2){var A=nr[0].p,B=nr[1].p;edges=edges.filter(function(e){return !((e[0]===A&&e[1]===B)||(e[0]===B&&e[1]===A));});state.lines.push({layer:'통신관로',pts:[[A.x,A.y],[mh.wx,mh.wy],[B.x,B.y]]});mhCount++;}
    else if(nr.length===1){var A1=nr[0].p;state.lines.push({layer:'통신관로',pts:[[A1.x,A1.y],[mh.wx,mh.wy]]});mhCount++;}
  });
  edges.forEach(function(e){state.lines.push({layer:'통신관로',pts:[[e[0].x,e[0].y],[e[1].x,e[1].y]]});});
  drawGeo();updMeta();toast('자동 결선 '+edges.length+'개 + 맨홀통과 '+mhCount+'개 (검수·수정하세요)');
}

  var col=(LINECOL[drawLayer]||{}).c||'#d92b2b', lw=(LINECOL[drawLayer]||{}).w||1.6;
  for(var i=1;i<lineDraft.length;i++){var a=S(lineDraft[i-1][0],lineDraft[i-1][1]),b=S(lineDraft[i][0],lineDraft[i][1]);

function startDraw(layer){drawLayer=layer||'통신관로';mode='line';setModeUI();lineDraft=[];clearSvg(gDraft);clearSvg(gDraw);toast((drawLayer==='지거'?'지거선':'관로선')+' 그리기: 점 클릭 → Enter/Space 또는 "완료" (되돌리기=한 점 취소)');}

function clearLines(){state.lines=state.lines.filter(function(l){return l.layer!=='통신관로';});drawGeo();updMeta();toast('결선 모두 삭제');}

function segDist(px,py,ax,ay,bx,by){var dx=bx-ax,dy=by-ay,L2=dx*dx+dy*dy,t=L2?((px-ax)*dx+(py-ay)*dy)/L2:0;t=Math.max(0,Math.min(1,t));var cx=ax+t*dx,cy=ay+t*dy;return Math.hypot(px-cx,py-cy);}
function deleteSegmentAt(wx,wy){
  var best=null,bd=1e18;
  state.lines.forEach(function(L,li){ if(L.layer!==delLayer)return;
    for(var s=0;s<L.pts.length-1;s++){var a=S(L.pts[s][0],L.pts[s][1]),b=S(L.pts[s+1][0],L.pts[s+1][1]);
      var d=segDist(wx,wy,a[0],a[1],b[0],b[1]); if(d<bd){bd=d;best={li:li,si:s};}}});
  if(!best||bd>vb.w*0.03){toast('지울 선에 더 가까이 클릭하세요');return;}
  var L=state.lines[best.li],left=L.pts.slice(0,best.si+1),right=L.pts.slice(best.si+1),repl=[];
  if(left.length>=2)repl.push({layer:L.layer,pts:left,note:L.note});
  if(right.length>=2)repl.push({layer:L.layer,pts:right});
  state.lines.splice.apply(state.lines,[best.li,1].concat(repl));
  clearSvg(gDraw);drawGeo();updMeta();toast('선 1개 삭제');
}

cv.addEventListener('pointermove',function(e){

    previewLine.setAttribute('x1',last[0]);previewLine.setAttribute('y1',last[1]);previewLine.setAttribute('x2',w[0]);previewLine.setAttribute('y2',w[1]);}

function decodeBuf(buf){var u=new TextDecoder('utf-8',{fatal:false}).decode(buf);if(u.indexOf('\uFFFD')>=0){try{return new TextDecoder('euc-kr').decode(buf);}catch(e){return u;}}return u;}
function splitCsvLine(s){var out=[],cur='',q=false;for(var i=0;i<s.length;i++){var c=s[i];if(c==='"'){q=!q;}else if(c===','&&!q){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out;}
function parseCsv(text,fname){
  var rows=text.replace(/\r/g,'').split('\n').filter(function(l){return l.trim().length;});
  if(!rows.length)return [];
  var head=splitCsvLine(rows[0]).map(function(s){return s.trim();});
  function col(){for(var a=0;a<arguments.length;a++){var i=head.indexOf(arguments[a]);if(i>=0)return i;}return -1;}
  var ci={name:col('이름','번호'),x:col('X'),y:col('Y'),z:col('Z(레벨)','Z','Z(레벨)'),code:col('코드'),date:col('현재날짜')};
  var dm=(fname||'').match(/20(\d{6})/);var fdate=dm?dm[1]:'';
  var pts=[];
  for(var r=1;r<rows.length;r++){var f=splitCsvLine(rows[r]);
    var cx=parseFloat(f[ci.x]),cy=parseFloat(f[ci.y]);if(isNaN(cx)||isNaN(cy))continue;
    var dt=fdate; if(ci.date>=0&&f[ci.date]){var m=f[ci.date].match(/(\d{2})(\d{2})-?(\d{2})-?(\d{2})|\d{4}-(\d{2})-(\d{2})/);var raw=(f[ci.date]||'').replace(/[^0-9]/g,'');if(raw.length>=8)dt=raw.slice(2,8);}
    var name=ci.name>=0?(f[ci.name]||'').trim():String(r);
    pts.push({no:(dt?dt+'-':'')+name, x:cy, y:cx, z:ci.z>=0?parseFloat(f[ci.z]):null, code:ci.code>=0?(f[ci.code]||'').trim():''});
  }
  return pts;
}
function parseDxfLines(text){
  var L=text.replace(/\r/g,'').split('\n'),pairs=[];
  for(var i=0;i+1<L.length;i+=2)pairs.push([L[i].trim(),L[i+1]]);
  var lines=[],i2=0;
  while(i2<pairs.length){
    var code=pairs[i2][0],val=pairs[i2][1];
    if(code==='0'&&(val.trim()==='LWPOLYLINE'||val.trim()==='POLYLINE'||val.trim()==='LINE')){
      var type=val.trim(),layer='0',xs=[],ys=[],j=i2+1,ent={};
      while(j<pairs.length&&pairs[j][0]!=='0'){var c=pairs[j][0],v=pairs[j][1];
        if(c==='8')layer=v.trim();
        if(type==='LINE'){if(c==='10')ent.x1=parseFloat(v);if(c==='20')ent.y1=parseFloat(v);if(c==='11')ent.x2=parseFloat(v);if(c==='21')ent.y2=parseFloat(v);}
        else{if(c==='10')xs.push(parseFloat(v));if(c==='20')ys.push(parseFloat(v));}
        j++;}
      if(type==='LINE'&&ent.x1!=null)lines.push({layer:layer,pts:[[ent.x1,ent.y1],[ent.x2,ent.y2]]});
      else if(xs.length>=2){var pp=[];for(var k=0;k<xs.length;k++)pp.push([xs[k],ys[k]]);lines.push({layer:layer,pts:pp});}
      i2=j;
    } else i2++;
  }
  return lines;
}

function refreshProjects(){ if(!online)return;
  sb.from('survey_projects').select('id,name,updated_at').order('updated_at',{ascending:false}).then(function(res){
    var sel=document.getElementById('proj');sel.innerHTML='<option value="">현장 선택…</option>';
    (res.data||[]).forEach(function(p){var o=document.createElement('option');o.value=p.id;o.textContent=p.name;sel.appendChild(o);});
    if(state.projectId)sel.value=state.projectId;
  });
}
function saveProject(){
  var payload={points:state.points,lines:state.lines,labelOff:state.labelOff,markups:state.markups.map(function(m){var c={};for(var k in m)if(k!=='el')c[k]=m[k];return c;}),manholes:state.manholes};  if(!online){toast('로컬 모드 — Supabase 키를 넣으면 저장됩니다');return;}
  if(!state.projectName){toast('현장명을 먼저 정하세요(새 현장)');return;}
  var row={name:state.projectName,payload:payload,updated_at:new Date().toISOString()};
  if(state.projectId)row.id=state.projectId;
  sb.from('survey_projects').upsert(row).select().then(function(res){
    if(res.error){toast('저장 오류: '+res.error.message);return;}
    var saved=res.data&&res.data[0];if(saved){state.projectId=saved.id;}
    sb.from('survey_history').insert({project_id:state.projectId,payload:payload}); // 이력
    refreshProjects();loadPhotos();toast('저장 완료');
  });
}
function loadProject(id){ if(!online||!id)return;
  sb.from('survey_projects').select('*').eq('id',id).single().then(function(res){
    if(res.error||!res.data){toast('불러오기 실패');return;}
    var p=res.data.payload||{};state.projectId=res.data.id;state.projectName=res.data.name;
    state.points=p.points||[];state.lines=p.lines||[];state.markups=(p.markups||[]);state.labelOff=p.labelOff||{};state.manholes=p.manholes||[];
    selNum=null;clearSvg(gSel);drawGeo();drawMarks();drawManholes();fitView();updMeta();loadPhotos();toast('현장 불러옴: '+res.data.name);
  });
}

function toneStyle(tone,active){var c=TONE[tone]||{bg:'#f3f3f0',fg:'#333'};return active?('background:'+c.fg+';color:#fff;border:1px solid '+c.fg+';border-left:4px solid '+c.fg+';border-radius:0 8px 8px 0;font-weight:700;'):('background:#fff;color:'+c.fg+';border:1px solid #e3e3df;border-left:4px solid '+c.fg+';border-radius:0 8px 8px 0;font-weight:600;');}
function railStyle(col,active){col=col||{bg:'#f3f3f0',fg:'#333'};return active?('background:'+col.bg+';color:'+col.fg+';border:1px solid '+col.fg+';border-left:4px solid '+col.fg+';border-radius:0 8px 8px 0;font-weight:700;'):('background:#fff;color:'+col.fg+';border:1px solid #e3e3df;border-left:4px solid '+col.fg+';border-radius:0 8px 8px 0;font-weight:600;');}

function mkBtn(tool,i){
  var active=(tool.mode&&mode===tool.mode)||(tool.activeMode&&mode===tool.activeMode)||(tool.status&&status===tool.status);
  if(tool.soon)return '<button class="sub-b soon" style="'+toneStyle(tool.tone,false)+'opacity:.55">'+tool.t+'</button>';
  var kb=keyForAction('tool:'+curCat().k+':'+i),bdg=kb?'<span class="hk-badge">'+kb+'</span>':'';
  return '<button data-i="'+i+'" class="sub-b" style="'+toneStyle(tool.tone,active)+'">'+tool.t+bdg+'</button>';
}
function renderSub(){
  var c=curCat(),s=document.getElementById('subbar'),html='';
  if(c.tools.length)html+=c.tools.map(mkBtn).join('');

  html+='<span class="viewgrp"><button data-g="undo">되돌리기</button><button data-g="clearMk">심벌지우기</button>'
      +'<span class="subhint">보기</span><span class="zoomwrap2"><button data-g="zout">－</button><button data-g="zin">＋</button><button data-g="fit">전체</button></span></span>';

      if(tool.status){status=tool.status;setStatusUI();}
    };});

var HK_KEY='survey_hotkeys';
function loadHotkeys(){try{return JSON.parse(localStorage.getItem(HK_KEY)||'{}')||{};}catch(e){return {};}}
function saveHotkeys(){try{localStorage.setItem(HK_KEY,JSON.stringify(hotkeys));}catch(e){}}
var hotkeys=loadHotkeys(); // {actionId:'A'}
function keyForAction(id){return hotkeys[id]?hkLabel(hotkeys[id]):'';}
function actionForKey(key){for(var id in hotkeys){if(hotkeys[id]===key)return id;}return null;}
function normKey(e){var k=e.key;if(!k)return '';
  if(k===' ')return '';                       // 스페이스=그리기 완료용, 제외
  if(k.length===1)return k.toUpperCase();
  if(/^(Arrow(Up|Down|Left|Right)|F[1-9]|F1[0-2])$/.test(k))return k;
  return '';}
function hkLabel(k){return k.replace('Arrow','').replace('Up','↑').replace('Down','↓').replace('Left','←').replace('Right','→');}
function actionList(){var arr=[];
  TB.forEach(function(c){arr.push({id:'cat:'+c.k,name:c.icon+' '+c.label,grp:c.label});
    c.tools.forEach(function(t,i){if(t.soon)return;arr.push({id:'tool:'+c.k+':'+i,name:'└ '+t.t,grp:c.label});});});
  return arr;}
function runAction(id){
  if(id.indexOf('cat:')===0){var k=id.slice(4);activeCat=k;var c=curCat();
    if(c.setmode){mode=c.setmode;cv.classList.toggle('draw',mode!=='pan');setModeUI();}
    renderRail();renderSub();if(c.hint&&!c.tools.length)toast(c.hint);}
  else if(id.indexOf('tool:')===0){var p=id.split(':'),ck=p[1],i=+p[2];
    activeCat=ck;renderRail();renderSub();
    var b=document.querySelector('#subbar button[data-i="'+i+'"]');if(b)b.click();}
}
var hkCapturing=null;
function openHotkeyModal(){
  var ov=document.createElement('div');ov.className='hk-overlay';ov.id='hkOverlay';
  ov.innerHTML='<div class="hk-card"><h3>⌨ 단축키 설정 <span style="font-weight:400;color:#999;font-size:12px">— 칸을 누른 뒤 키보드를 누르세요</span></h3><div class="hk-body" id="hkBody"></div><div class="hk-foot"><button id="hkReset" style="background:#fff;color:#888;border:1px solid #e3e3df;border-radius:7px">전체 초기화</button><button id="hkClose" style="background:#222;color:#fff;border:none;border-radius:7px;font-weight:600">닫기</button></div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('mousedown',function(e){if(e.target===ov)closeHotkeyModal();});
  document.getElementById('hkClose').onclick=closeHotkeyModal;
  document.getElementById('hkReset').onclick=function(){if(confirm('설정한 단축키를 모두 지울까요?')){hotkeys={};saveHotkeys();renderHkBody();renderRail();renderSub();}};
  renderHkBody();
}
function closeHotkeyModal(){hkCapturing=null;var ov=document.getElementById('hkOverlay');if(ov)ov.remove();}
function renderHkBody(){
  var body=document.getElementById('hkBody');if(!body)return;
  var list=actionList(),html='',lastGrp=null;
  list.forEach(function(a){
    if(a.grp!==lastGrp){html+='<div class="hk-grp">'+a.grp+'</div>';lastGrp=a.grp;}
    var raw=hotkeys[a.id],disp=hkCapturing===a.id?'…':(raw?hkLabel(raw):'지정');
    var cls='keyb'+(raw?' set':'')+(hkCapturing===a.id?' cap':'');
    html+='<div class="hk-row"><span class="nm">'+a.name+'</span><span class="'+cls+'" data-id="'+a.id+'">'+disp+'</span><span class="clr" data-clr="'+a.id+'">✕</span></div>';
  });
  body.innerHTML=html;
  body.querySelectorAll('.keyb').forEach(function(el){el.onclick=function(){hkCapturing=el.getAttribute('data-id');renderHkBody();};});
  body.querySelectorAll('.clr').forEach(function(el){el.onclick=function(){var id=el.getAttribute('data-clr');delete hotkeys[id];saveHotkeys();renderHkBody();renderRail();renderSub();};});
}
window.addEventListener('keydown',function(e){
  if(hkCapturing){
    if(e.key==='Escape'){hkCapturing=null;renderHkBody();return;}
    var nk=normKey(e);if(!nk)return;e.preventDefault();
    var prev=actionForKey(nk);if(prev&&prev!==hkCapturing)delete hotkeys[prev];
    hotkeys[hkCapturing]=nk;hkCapturing=null;saveHotkeys();renderHkBody();renderRail();renderSub();return;
  }
  var tg=(e.target&&e.target.tagName)||'';if(/INPUT|TEXTAREA|SELECT/.test(tg))return;
  if(document.getElementById('hkOverlay'))return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  var k=normKey(e);if(!k)return;
  var id=actionForKey(k);if(id){e.preventDefault();runAction(id);}
},true);

var photoMap={}, selNum=null, photoPanelOpen=false, photoLink=true;
var gSel=document.createElementNS(SVGNS,'g'); gSel.setAttribute('pointer-events','none'); cv.appendChild(gSel);
var gDraw=document.createElementNS(SVGNS,'g'); gDraw.setAttribute('pointer-events','none'); cv.appendChild(gDraw);
function ptNum(p){return (p.no||'').toString().split('-').pop();}
function pointByNum(n){for(var i=0;i<state.points.length;i++)if(ptNum(state.points[i])===String(n))return state.points[i];return null;}
function sortedNums(){return state.points.map(ptNum).filter(function(v){return v!=='';}).sort(function(a,b){return (parseFloat(a)||0)-(parseFloat(b)||0);});}
function pointAtCoord(x,y){for(var i=0;i<state.points.length;i++){var q=state.points[i];if(Math.abs(q.x-x)<0.06&&Math.abs(q.y-y)<0.06)return q;}return null;}
function lineNeighbors(sel){var p=pointByNum(sel);if(!p)return [];var res=[];(state.lines||[]).forEach(function(l){if(l.layer!=='통신관로')return;var pts=l.pts;for(var i=0;i<pts.length;i++){if(Math.abs(pts[i][0]-p.x)<0.06&&Math.abs(pts[i][1]-p.y)<0.06){[i-1,i+1].forEach(function(j){if(j>=0&&j<pts.length){var q=pointAtCoord(pts[j][0],pts[j][1]);if(q&&ptNum(q)!==String(sel)&&res.indexOf(q)<0)res.push(q);}});}}});return res;}
function neighborsOf(sel){var selP=pointByNum(sel),up=null,down=null;if(!selP)return {up:null,down:null};
  var nb=lineNeighbors(sel);
  if(nb.length){nb.forEach(function(q){if(q.y>selP.y){if(!up||q.y<up.y)up=q;}else{if(!down||q.y>down.y)down=q;}});}
  else{var ups=[],downs=[];state.points.forEach(function(q){if(ptNum(q)===String(sel))return;var d=Math.hypot(q.x-selP.x,q.y-selP.y);(q.y>selP.y?ups:downs).push({q:q,d:d});});ups.sort(function(a,b){return a.d-b.d;});downs.sort(function(a,b){return a.d-b.d;});if(ups[0])up=ups[0].q;if(downs[0])down=downs[0].q;}
  return {up:up,down:down};}
function highlightSel(){clearSvg(gSel);if(selNum==null)return;var p=pointByNum(selNum);if(!p)return;
  var nbs=neighborsOf(selNum);
  [nbs.up,nbs.down].forEach(function(q){if(q){var sy=S(q.x,q.y);gSel.appendChild(el('circle',{cx:sy[0],cy:sy[1],r:0.224,fill:'none',stroke:'#ffcc00','stroke-width':1.4,'vector-effect':'non-scaling-stroke'}));}});
  var s=S(p.x,p.y);gSel.appendChild(el('circle',{cx:s[0],cy:s[1],r:0.28,fill:'none',stroke:'#22cc00','stroke-width':2.2,'vector-effect':'non-scaling-stroke'}));}
function compressImage(file,maxW,q){return new Promise(function(res,rej){var img=new Image(),u=URL.createObjectURL(file);img.onload=function(){URL.revokeObjectURL(u);var w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(function(b){b?res(b):rej(new Error('blob'));},'image/jpeg',q);};img.onerror=function(){rej(new Error('img'));};img.src=u;});}
var zoomState={img:null,scale:1,tx:0,ty:0,drag:false,sx:0,sy:0};
function applyZoom(){var z=zoomState;if(!z.img)return;z.img.style.transform='translate('+z.tx+'px,'+z.ty+'px) scale('+z.scale+')';z.img.style.cursor=z.scale>1?(z.drag?'grabbing':'grab'):'zoom-in';}
function setupZoom(img){zoomState={img:img,scale:1,tx:0,ty:0,drag:false,sx:0,sy:0};if(!img)return;img.style.transformOrigin='center center';
  img.addEventListener('wheel',function(e){e.preventDefault();var z=zoomState;z.scale*=(e.deltaY<0?1.2:0.83);z.scale=Math.max(1,Math.min(6,z.scale));if(z.scale<=1){z.scale=1;z.tx=0;z.ty=0;}applyZoom();},{passive:false});
  img.addEventListener('mousedown',function(e){var z=zoomState;if(z.scale<=1)return;e.preventDefault();z.drag=true;z.sx=e.clientX-z.tx;z.sy=e.clientY-z.ty;applyZoom();});
  img.addEventListener('dblclick',function(e){e.preventDefault();var z=zoomState;z.scale=1;z.tx=0;z.ty=0;applyZoom();});
  applyZoom();}
window.addEventListener('mousemove',function(e){var z=zoomState;if(!z.drag)return;z.tx=e.clientX-z.sx;z.ty=e.clientY-z.sy;applyZoom();});
window.addEventListener('mouseup',function(){var z=zoomState;if(z.drag){z.drag=false;applyZoom();}});
function paneImg(num,label,big){var url=num!=null?photoMap[num]:null;var p=num!=null?pointByNum(num):null;var sub=p?(p.no+' '+((p.code||'').trim())):(num!=null?('번호 '+num):'');
  var cap=sub?(label+' / '+sub):label;
  var inner;
  if(url){inner=big?('<div class="zoomwrap"><img class="ph" id="zoomImg" src="'+url+'" alt=""></div>'):('<img class="ph" src="'+url+'" alt="">');}
  else{inner='<div class="ph php-none">'+(num!=null?'사진 없음':'-')+'</div>';}
  return '<div class="'+(big?'php-main':'php-sub')+'"><div class="cap"><span>'+cap+'</span></div>'+inner+'</div>';}
function refreshPhotoPanel(){
  var sel=document.getElementById('photoSel'),nums=sortedNums();
  sel.innerHTML='<option value="">측점 선택…</option>'+nums.map(function(n){var p=pointByNum(n);return '<option value="'+n+'">'+(p?p.no:n)+'</option>';}).join('');
  if(selNum!=null)sel.value=String(selNum);
  var body=document.getElementById('photoBody');
  if(selNum==null){body.innerHTML='<div style="color:#999;font-size:12px;padding:14px;text-align:center;line-height:1.7">측점을 선택하세요.<br>(위 드롭다운 또는 도면에서 점 클릭)<br>또는 <b>사진 업로드</b>로 일괄 등록</div>';return;}
  var nbs=neighborsOf(selNum),up=nbs.up,down=nbs.down;
  var n1=up?ptNum(up):null,n2=down?ptNum(down):null;
  body.innerHTML=paneImg(selNum,'선택측점 사진',true)+'<div class="php-row">'+paneImg(n1,'위 측점',false)+paneImg(n2,'아래 측점',false)+'</div>';
  setupZoom(document.getElementById('zoomImg'));
}
function selectPoint(num){selNum=String(num);drawGeo();highlightSel();var sel=document.getElementById('photoSel');if(sel)sel.value=String(num);if(photoPanelOpen)refreshPhotoPanel();}
function openPhotoPanel(o){photoPanelOpen=(o==null)?!photoPanelOpen:!!o;document.getElementById('photoPanel').classList.toggle('open',photoPanelOpen);if(photoPanelOpen)refreshPhotoPanel();setTimeout(function(){fitView();if(typeof placeCoord==='function')placeCoord();},30);}
function loadPhotos(){photoMap={};if(!online||!state.projectId){if(photoPanelOpen)refreshPhotoPanel();return;}
  sb.from('survey_photos').select('point_no,url').eq('project_id',state.projectId).then(function(res){(res.data||[]).forEach(function(r){photoMap[r.point_no]=r.url;});if(photoPanelOpen)refreshPhotoPanel();});}
function uploadPhotos(files){
  if(!online){toast('로컬 모드 — 사진 저장 불가');return;}
  if(!state.projectId){toast('먼저 "저장"으로 현장을 저장한 뒤 사진을 올려주세요');return;}
  var arr=[].slice.call(files);if(!arr.length)return;toast('사진 '+arr.length+'장 업로드 중…');
  var done=0,ok=0;
  arr.forEach(function(f){
    var num=(f.name.replace(/\.[^.]+$/,'').match(/\d+/)||[''])[0];
    if(!num){done++;if(done===arr.length)toast(ok+'/'+arr.length+'장 완료');return;}
    compressImage(f,1280,0.7).then(function(blob){
      var path=state.projectId+'/'+num+'.jpg';
      return sb.storage.from('photos').upload(path,blob,{upsert:true,contentType:'image/jpeg'}).then(function(up){
        if(up.error)throw up.error;
        var url=sb.storage.from('photos').getPublicUrl(path).data.publicUrl+'?t='+Date.now();
        return sb.from('survey_photos').delete().eq('project_id',state.projectId).eq('point_no',num).then(function(){
          return sb.from('survey_photos').insert({project_id:state.projectId,point_no:num,url:url}).then(function(ins){if(ins.error)throw ins.error;photoMap[num]=url;ok++;});
        });
      });
    }).catch(function(err){console.error('photo upload',num,err);}).then(function(){
      done++;if(done===arr.length){toast(ok+'/'+arr.length+'장 업로드 완료');if(photoPanelOpen)refreshPhotoPanel();}
    });
  });
}
bind('photoBtn',function(){openPhotoPanel();});
document.getElementById('photoClose').onclick=function(){openPhotoPanel(false);};
document.getElementById('photoUp').onclick=function(){document.getElementById('fPhotos').click();};
document.getElementById('photoLinkBtn').onclick=function(){photoLink=!photoLink;this.textContent=photoLink?'🔗 연동':'🔓 미연동';this.classList.toggle('linkon',photoLink);toast(photoLink?'도면↔사진 연동 ON (점 클릭=사진)':'연동 OFF (점 클릭해도 사진 고정)');};
document.getElementById('fPhotos').addEventListener('change',function(e){uploadPhotos(e.target.files);e.target.value='';});
document.getElementById('photoSel').addEventListener('change',function(e){if(e.target.value){selNum=e.target.value;drawGeo();highlightSel();refreshPhotoPanel();}else{selNum=null;drawGeo();clearSvg(gSel);refreshPhotoPanel();}});
/* 도면에서 점 클릭 → 선택 (이동 모드) */
cv.addEventListener('click',function(e){
  if(mode!=='pan'||labelDragging)return;
  var w=toWorld(e.clientX,e.clientY),r=cv.getBoundingClientRect(),wpp=vb.w/r.width;
  var nr=nearestPointWorld(w[0],w[1]);
  if(nr.p&&nr.d<40*wpp){
    if(photoLink){selectPoint(ptNum(nr.p));}
    else{selNum=String(ptNum(nr.p));drawGeo();highlightSel();}
    toast('측점 '+nr.p.no+' 선택'+(photoLink?'':' (미연동·사진고정)'));
  }
});

/* ====== 좌표 표시 (마우스 따라) ====== */
function fmtCoord(v){return v.toLocaleString('en-US',{minimumFractionDigits:3,maximumFractionDigits:3});}
var coordBox=document.getElementById('coordBox');
var cwrap=cv.parentElement;
function placeCoord(){var r=cv.getBoundingClientRect();coordBox.style.right=(Math.max(2,window.innerWidth-r.right)+10)+'px';coordBox.style.bottom=(Math.max(2,window.innerHeight-r.bottom)+10)+'px';}
function coordReset(){coordBox.innerHTML='X <b>–</b>　Y <b>–</b>';placeCoord();if(gDraw)clearSvg(gDraw);}
cwrap.addEventListener('mousemove',function(e){
  placeCoord();
  var w=toWorld(e.clientX,e.clientY); var X=-w[1], Y=w[0];   // X=북, Y=동
  var r=cv.getBoundingClientRect(), wpp=vb.w/r.width;
  var nr=nearestPointWorld(w[0],w[1]); var near='';
  if(nr.p && nr.d < 22*wpp){ near='<span class="cb-near">'+nr.p.no+'  '+((nr.p.code||'').trim())+'</span>'; }
  coordBox.innerHTML='X <b>'+fmtCoord(X)+'</b>　Y <b>'+fmtCoord(Y)+'</b>'+near;
  if(mode==='line')drawIndicators(w); else if(mode==='delline')delHoverHighlight(w); else if(gDraw.childNodes.length)clearSvg(gDraw);
});
cwrap.addEventListener('mouseleave',coordReset);
window.addEventListener('resize',function(){placeCoord();if(typeof drawGeo==='function'){drawGeo();drawManholes();highlightSel();}});
coordReset();
window.addEventListener('keydown',function(e){
  var tg=((e.target||{}).tagName)||'';if(/INPUT|TEXTAREA|SELECT/.test(tg))return;
  if(mode==='line'){if(e.key==='Enter'||e.key===' '||e.code==='Space'){e.preventDefault();finishDraw();}}
  else if(mode==='mhplace'){if(e.key==='Enter'||e.key===' '||e.code==='Space'){e.preventDefault();mode='pan';setModeUI();toast('맨홀심기 종료');}}
});
document.getElementById('recClear').onclick=function(){if(!state.markups.length){toast('삭제할 검수 기록이 없습니다');return;}state.markups.forEach(function(r){if(r.el)r.el.remove();});state.markups=[];renderRecs();toast('검수 기록 전체 삭제');};

setModeUI();setStatusUI();initSb();updMeta();toast('CSV 업로드 또는 상단에서 현장을 선택하세요');
</script>
