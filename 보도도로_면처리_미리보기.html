<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>보도/도로 면처리 미리보기</title>
<style>

<h1>보도 / 도로 면처리 미리보기 <span class="hint">DXF 61 · 심도 56 · 맨홀 4</span></h1>
<div class="bar">

  <button class="btn sw" id="mSw">🟩 보도 면 그리기</button>

</div>
<div id="wrap"><canvas id="cv"></canvas></div>

  <span class="hint" id="selInfo"></span>
</div>
<script>
const DATA={"depth":[[196740.12,542159.43],[196738.49,542155.62],[196737.41,542153.49],[196735.33,542150.62],[196732.62,542147.64],[196730.21,542145.72],[196729.2,542143.75],[196728.49,542139.78],[196727.67,542134.85],[196726.55,542131.48],[196723.85,542126.47],[196721.66,542121.32],[196718.09,542114.38],[196714.8,542107.46],[196708.74,542096.05],[196707.52,542094.98],[196706.01,542093.68],[196703.5,542092.27],[196702.32,542090.48],[196701.53,542088.34],[196701.42,542082.19],[196700.98,542080.38],[196696.7,542071.62],[196692.43,542062.86],[196689.54,542057.15],[196762.73,542204.48],[196764.75,542208.66],[196764.91,542210.45],[196763.74,542212.75],[196684.37,542046.77],[196680.2,542038.19],[196677.21,542032.98],[196676.16,542030.61],[196620.09,542052.89],[196631.96,542047.39],[196643.97,542041.3],[196657.11,542035.04],[196618.14,542053.82],[196606.81,542059.5],[196595.67,542064.92],[196584.25,542070.34],[196573.07,542075.89],[196567.44,542079.04],[196562.95,542081.29],[196551.25,542086.62],[196542.52,542090.78],[196761.97,542202.91],[196759.55,542197.61],[196756.89,542192.29],[196753.74,542185.93],[196750.97,542180.86],[196749.84,542179.34],[196748.23,542175.15],[196745.63,542169.52],[196742.59,542164.0],[196741.05,542160.72]],"mh":[[196658.79,542033.79],[196729.69,542144.69],[196762.34,542203.72],[196702.88,542091.39]],"pipe":[[[196542.52,542090.78],[196551.25,542086.62]],[[196551.25,542086.62],[196562.95,542081.29]],[[196562.95,542081.29],[196567.44,542079.04]],[[196567.44,542079.04],[196573.07,542075.88]],[[196573.07,542075.88],[196584.25,542070.34]],[[196584.25,542070.34],[196595.67,542064.92]],[[196595.67,542064.92],[196606.81,542059.5]],[[196606.81,542059.5],[196618.14,542053.82]],[[196618.14,542053.82],[196620.09,542052.89]],[[196620.09,542052.89],[196631.96,542047.39]],[[196631.96,542047.39],[196643.97,542041.3]],[[196643.97,542041.3],[196657.11,542035.04]],[[196676.16,542030.61],[196677.21,542032.98]],[[196677.21,542032.98],[196680.2,542038.19]],[[196680.2,542038.19],[196684.37,542046.77]],[[196684.37,542046.77],[196689.54,542057.15]],[[196689.54,542057.15],[196692.43,542062.86]],[[196692.43,542062.86],[196696.7,542071.62]],[[196696.7,542071.62],[196700.98,542080.38]],[[196700.98,542080.38],[196701.42,542082.19]],[[196701.42,542082.19],[196701.53,542088.34]],[[196701.53,542088.34],[196702.32,542090.48]],[[196703.5,542092.27],[196706.01,542093.68]],[[196706.01,542093.68],[196707.52,542094.98]],[[196707.52,542094.98],[196708.74,542096.05]],[[196708.74,542096.05],[196714.8,542107.46]],[[196714.8,542107.46],[196718.09,542114.38]],[[196718.09,542114.38],[196721.66,542121.32]],[[196721.66,542121.32],[196723.84,542126.47]],[[196723.84,542126.47],[196726.55,542131.48]],[[196726.55,542131.48],[196727.66,542134.86]],[[196727.66,542134.86],[196728.49,542139.78]],[[196728.49,542139.78],[196729.2,542143.75]],[[196730.21,542145.72],[196732.62,542147.64]],[[196732.62,542147.64],[196735.33,542150.62]],[[196735.33,542150.62],[196737.41,542153.49]],[[196737.41,542153.49],[196738.49,542155.62]],[[196738.49,542155.62],[196740.12,542159.43]],[[196740.12,542159.43],[196741.05,542160.72]],[[196741.05,542160.72],[196742.59,542164.0]],[[196742.59,542164.0],[196745.63,542169.52]],[[196745.63,542169.52],[196748.23,542175.15]],[[196748.23,542175.15],[196749.84,542179.34]],[[196749.84,542179.34],[196750.97,542180.86]],[[196750.97,542180.86],[196753.74,542185.93]],[[196753.74,542185.93],[196756.9,542192.29]],[[196756.9,542192.29],[196759.55,542197.61]],[[196759.55,542197.61],[196761.97,542202.9]],[[196764.75,542208.66],[196764.91,542210.45]],[[196764.91,542210.45],[196763.74,542212.75]],[[196658.79,542033.79],[196657.11,542035.04]],[[196729.69,542144.69],[196730.21,542145.72]],[[196762.73,542204.48],[196764.75,542208.66]],[[196729.2,542143.75],[196729.69,542144.69]],[[196762.73,542204.48],[196762.34,542203.72]],[[196761.97,542202.9],[196762.34,542203.72]],[[196702.32,542090.48],[196702.88,542091.39]],[[196702.88,542091.39],[196703.5,542092.27]]],"hyun":[[[196772.37,542203.8],[196770.16,542203.81],[196769.35,542203.38],[196765.16,542194.83],[196754.23,542172.89],[196739.43,542142.81],[196738.68,542140.99],[196738.88,542140.01],[196740.22,542138.54]],[[196736.74,542132.85],[196734.75,542132.7],[196733.16,542130.03],[196724.66,542113.08],[196713.23,542090.38],[196713.3,542087.32],[196716.28,542084.0]],[[196713.69,542079.26],[196711.72,542079.74],[196709.59,542079.77],[196707.09,542077.49],[196705.25,542074.75],[196685.57,542033.4],[196682.67,542026.76],[196682.35,542024.17],[196682.76,542023.19],[196684.42,542021.93],[196692.47,542017.89]],[[196680.58,541994.02],[196671.84,541998.3],[196670.86,541998.55],[196669.49,541998.21],[196668.07,541996.86]],[[196660.52,542000.46],[196660.83,542002.08],[196660.1,542003.68],[196659.25,542004.3],[196638.7,542014.31],[196617.02,542024.94],[196597.37,542034.52],[196577.08,542044.34],[196563.19,542051.19],[196561.23,542051.34],[196559.74,542049.99],[196558.85,542048.17]],[[196549.73,542052.97],[196550.14,542054.94],[196549.78,542056.9],[196548.34,542058.24],[196532.72,542065.95],[196517.4,542073.38]],[[196574.99,542083.2],[196573.5,542080.05],[196573.45,542078.6],[196574.19,542076.93],[196575.26,542076.2],[196593.84,542067.18],[196623.23,542052.82],[196653.64,542037.82],[196666.48,542031.64],[196667.72,542031.18],[196668.97,542031.4],[196672.64,542032.81],[196674.2,542033.84],[196675.21,542035.14],[196676.46,542037.29],[196688.38,542061.52],[196697.76,542080.36],[196698.35,542082.11],[196698.48,542083.4],[196698.07,542084.58],[196696.81,542086.38],[196695.37,542087.79]],[[196697.05,542093.07],[196699.32,542092.28],[196701.13,542092.38],[196702.44,542092.57],[196703.42,542092.98],[196704.35,542094.21],[196721.54,542128.7],[196725.69,542137.11],[196725.68,542138.72],[196724.72,542140.07]],[[196726.35,542145.59],[196728.38,542145.63],[196729.73,542146.23],[196730.77,542147.48],[196742.73,542171.67],[196757.34,542200.97],[196764.55,542215.4],[196766.48,542218.09],[196768.29,542220.35],[196775.57,542227.98]],[[196568.56,542086.37],[196567.06,542083.44],[196565.86,542082.16],[196564.63,542081.81],[196563.4,542082.0],[196545.0,542091.1],[196527.48,542099.54]],[[196784.64,542223.6],[196780.45,542219.37],[196779.55,542217.63],[196779.04,542215.06],[196780.23,542204.7],[196780.84,542197.61]],[[196774.56,542197.37],[196774.21,542201.45],[196773.07,542203.45],[196772.37,542203.8]]],"bp":[]};
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=cv.clientWidth||660, H=520;
function fitCanvas(){W=cv.clientWidth||660; cv.width=W; cv.height=H;}
// bounds
let allXY=[].concat(DATA.depth,DATA.mh);
DATA.pipe.forEach(L=>L.forEach(p=>allXY.push(p)));
DATA.hyun.forEach(L=>L.forEach(p=>allXY.push(p)));
const minX=Math.min(...allXY.map(p=>p[0])), maxX=Math.max(...allXY.map(p=>p[0]));
const minY=Math.min(...allXY.map(p=>p[1])), maxY=Math.max(...allXY.map(p=>p[1]));
let view={scale:1,ox:0,oy:0};
function fitView(){
  const pad=24, sw=(W-pad*2)/(maxX-minX), sh=(H-pad*2)/(maxY-minY);
  view.scale=Math.min(sw,sh);
  view.ox=(minX+maxX)/2; view.oy=(minY+maxY)/2;
  draw();
}
function S(p){ return [ (p[0]-view.ox)*view.scale + W/2, -(p[1]-view.oy)*view.scale + H/2 ]; }
function toWorld(sx,sy){ return [ (sx-W/2)/view.scale + view.ox, -(sy-H/2)/view.scale + view.oy ]; }

let mode='sel'; // sel | sw | rd
let zones=[]; // {type:'보도'|'도로', poly:[[x,y]...]}
let cur=[];   // 그리는 중 폴리곤
let cls={};   // index판정: 'sw_'+i -> '보도'/'도로'
let sel=null;
let mouseW=null;

function ptInPoly(pt,poly){
  let c=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if(((yi>pt[1])!=(yj>pt[1])) && (pt[0]<(xj-xi)*(pt[1]-yi)/(yj-yi)+xi)) c=!c;
  }
  return c;
}
function classify(){
  cls={};
  const pts=DATA.depth.map((p,i)=>['d',i,p]).concat(DATA.mh.map((p,i)=>['m',i,p]));
  pts.forEach(([t,i,p])=>{
    let r=null;
    zones.forEach(z=>{ if(ptInPoly(p,z.poly)) r=z.type; });
    cls[t+i]=r;
  });
  let sw=0,rd=0,no=0;
  Object.values(cls).forEach(v=>{ if(v==='보도')sw++; else if(v==='도로')rd++; else no++; });
  document.getElementById('cSw').textContent=sw;
  document.getElementById('cRd').textContent=rd;
  document.getElementById('cNo').textContent=no;
}
function colorOf(t,i){
  const v=cls[t+i];
  if(v==='보도')return '#1a7a5e';
  if(v==='도로')return '#e8820c';
  return t==='m'?'#d92b2b':'#377add';
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // 면
  zones.concat(cur.length?[{type:mode==='rd'?'도로':'보도',poly:cur,_draft:true}]:[]).forEach(z=>{
    if(z.poly.length<2)return;
    ctx.beginPath();
    z.poly.forEach((p,i)=>{const s=S(p); i?ctx.lineTo(s[0],s[1]):ctx.moveTo(s[0],s[1]);});
    if(!z._draft)ctx.closePath();
    const col=z.type==='도로'?'136,136,136':'26,122,94';
    ctx.fillStyle='rgba('+col+','+(z._draft?0.10:0.18)+')';
    if(!z._draft)ctx.fill();
    ctx.strokeStyle='rgba('+col+',0.9)'; ctx.lineWidth=z._draft?1.2:1.8;
    ctx.setLineDash(z._draft?[5,4]:[]); ctx.stroke(); ctx.setLineDash([]);
    if(z._draft)z.poly.forEach(p=>{const s=S(p);ctx.fillStyle='rgba('+col+',0.9)';ctx.beginPath();ctx.arc(s[0],s[1],3,0,7);ctx.fill();});
  });
  // 고무줄
  if(cur.length&&mouseW){const a=S(cur[cur.length-1]),b=S(mouseW);
    ctx.strokeStyle='#bbb';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();ctx.setLineDash([]);}
  // 관로
  ctx.strokeStyle='#d92b2b';ctx.lineWidth=1.6;
  DATA.pipe.forEach(L=>{ctx.beginPath();L.forEach((p,i)=>{const s=S(p);i?ctx.lineTo(s[0],s[1]):ctx.moveTo(s[0],s[1]);});ctx.stroke();});
  // 현황선
  ctx.strokeStyle='#29b6f6';ctx.lineWidth=1.3;
  DATA.hyun.forEach(L=>{ctx.beginPath();L.forEach((p,i)=>{const s=S(p);i?ctx.lineTo(s[0],s[1]):ctx.moveTo(s[0],s[1]);});ctx.stroke();});
  // 측점 (심도)
  DATA.depth.forEach((p,i)=>{const s=S(p);ctx.fillStyle=colorOf('d',i);
    ctx.beginPath();ctx.arc(s[0],s[1],3.2,0,7);ctx.fill();
    if(sel&&sel.t==='d'&&sel.i===i){ctx.strokeStyle='#1633ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(s[0],s[1],6,0,7);ctx.stroke();}});
  // 맨홀
  DATA.mh.forEach((p,i)=>{const s=S(p);ctx.fillStyle=colorOf('m',i);
    ctx.fillRect(s[0]-4,s[1]-4,8,8);
    if(sel&&sel.t==='m'&&sel.i===i){ctx.strokeStyle='#1633ff';ctx.lineWidth=2;ctx.strokeRect(s[0]-7,s[1]-7,14,14);}});
}
function nearest(sx,sy){
  let best=null,bd=14;
  DATA.depth.forEach((p,i)=>{const s=S(p);const d=Math.hypot(s[0]-sx,s[1]-sy);if(d<bd){bd=d;best={t:'d',i:i,p:p};}});
  DATA.mh.forEach((p,i)=>{const s=S(p);const d=Math.hypot(s[0]-sx,s[1]-sy);if(d<bd){bd=d;best={t:'m',i:i,p:p};}});
  return best;
}
// 모드 버튼
function setMode(m){
  mode=m; cur=[];
  document.getElementById('mSel').classList.toggle('on',m==='sel');
  document.getElementById('mSw').classList.toggle('on',m==='sw');
  document.getElementById('mRd').classList.toggle('on',m==='rd');
  document.getElementById('hint').textContent =
    m==='sel'?'측점을 클릭해 선택하세요':
    m==='sw'?'보도 외곽을 순서대로 클릭 → ✓ 면 완성':'도로 외곽을 순서대로 클릭 → ✓ 면 완성';
  draw();
}
document.getElementById('mSel').onclick=()=>setMode('sel');
document.getElementById('mSw').onclick=()=>setMode('sw');
document.getElementById('mRd').onclick=()=>setMode('rd');
document.getElementById('bUndo').onclick=()=>{if(cur.length)cur.pop();draw();};
document.getElementById('bClose').onclick=()=>{
  if(cur.length>=3){zones.push({type:mode==='rd'?'도로':'보도',poly:cur.slice()});cur=[];classify();draw();}
};
document.getElementById('bClear').onclick=()=>{zones=[];cur=[];classify();draw();};
document.getElementById('bFit').onclick=()=>fitView();
// 캔버스 인터랙션
let drag=null;
cv.addEventListener('pointerdown',e=>{
  const r=cv.getBoundingClientRect(), sx=e.clientX-r.left, sy=e.clientY-r.top;
  if(mode==='sel'){
    const n=nearest(sx,sy);
    if(n){sel=n; const v=cls[n.t+n.i];
      document.getElementById('selInfo').textContent=
        (n.t==='m'?'맨홀':'심도')+'측점 · '+(v||'미분류')+' · ('+n.p[0].toFixed(1)+', '+n.p[1].toFixed(1)+')';
      draw();}
    else { drag={x:e.clientX,y:e.clientY,ox:view.ox,oy:view.oy}; }
  } else {
    cur.push(toWorld(sx,sy)); draw();
  }
});
cv.addEventListener('pointermove',e=>{
  const r=cv.getBoundingClientRect(), sx=e.clientX-r.left, sy=e.clientY-r.top;
  mouseW=toWorld(sx,sy);
  if(drag){ view.ox=drag.ox-(e.clientX-drag.x)/view.scale; view.oy=drag.oy+(e.clientY-drag.y)/view.scale; draw(); }
  else if(mode!=='sel'&&cur.length) draw();
});
cv.addEventListener('pointerup',()=>{drag=null;});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect(), sx=e.clientX-r.left, sy=e.clientY-r.top;
  const w=toWorld(sx,sy); const f=e.deltaY<0?1.15:1/1.15;
  view.scale*=f; const w2=toWorld(sx,sy);
  view.ox+=w[0]-w2[0]; view.oy+=w[1]-w2[1]; draw();
},{passive:false});
cv.addEventListener('dblclick',()=>{ if(mode!=='sel'&&cur.length>=3){zones.push({type:mode==='rd'?'도로':'보도',poly:cur.slice()});cur=[];classify();draw();} });
window.addEventListener('resize',()=>{fitCanvas();fitView();});
fitCanvas(); classify(); fitView();
</script></body></html>
